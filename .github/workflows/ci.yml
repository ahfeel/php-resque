name: CI

on:
  push:
  pull_request:

jobs:
  # Full test suite + Rector check. PHPUnit 11 and Rector require PHP >= 8.2,
  # so the executable test suite runs on 8.2 and up.
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    name: Tests (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcntl, redis
          coverage: none

      - name: Install redis-server
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          # The test bootstrap starts its own redis-server on port 6379,
          # so free the port by stopping the packaged service.
          sudo service redis-server stop || true

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Check code is up to date with Rector
        run: vendor/bin/rector process --dry-run

      - name: Run test suite
        run: vendor/bin/phpunit
